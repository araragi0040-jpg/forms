<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ご予約入力フォーム</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="icon" href="favicon/favicon.jpg?v=3" type="image/jpeg">
<link rel="apple-touch-icon" href="favicon/apple-touch-icon.png?v=3">
<link rel="manifest" href="./favicon/site.webmanifest">
<meta name="theme-color" content="#fff7f2">
</head>

<body>
  <div class="wrap">
    <div class="hero">
      <div class="logo">
        <img src="favicon/favicon.jpg?v=3" alt="logo" loading="eager" decoding="sync"></div>
      <div>
        <h1>ご予約入力フォーム</h1>
        <p>
          <span class="hero-line">【事前注文10%OFF割引有り】</span>
          <span class="hero-line">オプション商品につきましては</span>
          <span class="hero-line">ご予約時ご注文に限り、</span>
          <span class="hero-line">10%OFFさせていただいております♩</span>
        </p>
      </div>
    </div>

    <div class="panel">
      <div class="card">
        <div class="topbar">
          <div class="progress">
            <div>進捗状況：</div>
            <div class="bar"><div id="barInner"></div></div>
            <div id="stepText">1 / 5</div>
          </div>
        </div>
      </div>

      <div class="card" id="pageCard">
        <div id="pageRoot"></div>
        <div class="err" id="errBox"></div>

        <div class="nav">
          <button class="btnGhost" id="btnBack">戻る</button>
          <button class="btnPrimary" id="btnNext">次へ</button>
        </div>
      </div>

      <div class="card done" id="doneCard">
        <h2>送信が完了しました 🌿</h2>
        <p>
          ありがとうございます。<br>
          内容を受け付けました。<br>
          公式LINEからのご連絡お待ちください。
        </p>
        <p style="margin-top:10px; font-size:12.5px;" id="doneId"></p>
      </div>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="loader">
      <div class="spinner"></div>
      <div>
        <div style="font-weight:800;">送信中です…</div>
      </div>
    </div>
  </div>

  <script src="./app.js" defer></script>
</body>
</html>
